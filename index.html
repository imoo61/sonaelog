<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>備えログ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="備えログ">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5f5f0;
      color: #333;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-text-size-adjust: 100%;
    }

    /* ヘッダー */
    header {
      background: #2d6a4f;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 20px; font-weight: bold; }
    header span { font-size: 22px; }

    /* メインコンテンツ */
    main {
      flex: 1;
      padding: 20px;
    }

    /* 画面（デフォルトは非表示） */
    .screen { display: none; }
    .screen.active { display: block; }

    /* セクションタイトル */
    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #2d6a4f;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #2d6a4f;
    }

    /* カード */
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h3 {
      font-size: 15px;
      color: #555;
      margin-bottom: 12px;
    }

    /* ダッシュボード：充足率ゲージ（仮） */
    .gauge-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .gauge-bar {
      background: #e0e0e0;
      border-radius: 8px;
      height: 20px;
      overflow: hidden;
    }
    .gauge-fill {
      background: linear-gradient(90deg, #2d6a4f, #52b788);
      height: 100%;
      border-radius: 8px;
      width: 0%;
      transition: width 0.5s ease, background 0.5s ease;
    }
    .gauge-note {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    /* 警告バッジ */
    .alert-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .alert-item:last-child { border-bottom: none; }
    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: bold;
    }
    .badge.danger { background: #fde8e8; color: #e53e3e; }
    .badge.warning { background: #fef3cd; color: #d69e2e; }

    /* 在庫リスト：カテゴリタブ */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      border: none;
      cursor: pointer;
      background: #e0e0e0;
      color: #555;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .tab.active {
      background: #2d6a4f;
      color: white;
    }

    /* 在庫アイテム（仮） */
    .stock-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .stock-item:last-child { border-bottom: none; }
    .stock-name { font-weight: bold; }
    .stock-meta { font-size: 12px; color: #888; margin-top: 2px; }

    /* 設定フォーム（仮） */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #555;
      margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px; /* 16px未満だとiOSが自動ズームする */
      background: white;
      appearance: none;
      -webkit-appearance: none;
    }

    /* エクスポート・インポートボタン */
    #export-btn, #import-btn {
      width: 100%;
      padding: 14px;
      background: white;
      color: #2d6a4f;
      border: 2px solid #2d6a4f;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      touch-action: manipulation;
    }
    #export-btn:active, #import-btn:active { background: #e8f5e9; }

    /* 追加・保存ボタン共通 */
    #add-btn {
      width: 100%;
      padding: 14px;
      background: #52b788;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
    }
    #add-btn:active { background: #3a8f6a; }

    /* 削除・編集ボタン */
    .delete-btn, .edit-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 10px 8px;
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    .delete-btn { color: #ccc; }
    .delete-btn:active { color: #e53e3e; }
    .edit-btn { color: #ccc; }
    .edit-btn:active { color: #2d6a4f; }

    /* 編集モード時のフォームカード強調 */
    .card.editing {
      border: 2px solid #52b788;
    }
    .card.editing h3 { color: #2d6a4f; }

    /* キャンセルボタン */
    /* 通知ボタン */
    #notif-btn {
      width: 100%;
      padding: 14px;
      background: #4a9eda;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
    }
    #notif-btn:active { opacity: 0.85; }
    #notif-btn:disabled { opacity: 0.7; cursor: default; }
    #notif-status {
      margin-top: 8px;
      font-size: 13px;
      text-align: center;
      color: #666;
      line-height: 1.5;
    }

    #cancel-edit-btn {
      width: 100%;
      padding: 11px;
      background: white;
      color: #888;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    #cancel-edit-btn:active { background: #f5f5f5; }

    /* ビュー切り替えトグル */
    .view-toggle {
      display: flex;
      background: #e8f5e9;
      border-radius: 20px;
      padding: 3px;
      margin-bottom: 16px;
    }
    .view-toggle-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      border-radius: 17px;
      font-size: 14px;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
      touch-action: manipulation;
    }
    .view-toggle-btn.active {
      background: #2d6a4f;
      color: white;
      font-weight: bold;
    }

    /* 場所別グループカード */
    .location-group {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .location-group-header {
      font-size: 15px;
      font-weight: bold;
      color: #2d6a4f;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .location-count {
      font-size: 12px;
      color: #888;
      font-weight: normal;
    }

    /* 水専用オプション */
    #water-options {
      background: #e8f4ff;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-left: 3px solid #4a9eda;
    }
    #water-options .form-group { margin-bottom: 10px; }
    #water-options .form-group:last-child { margin-bottom: 0; }
    #water-options label { color: #2c6fa0; }

    /* 保存ボタン */
    #save-btn {
      width: 100%;
      padding: 14px;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 8px;
      touch-action: manipulation;
    }
    #save-btn:active { background: #1e4d38; }

    /* ボトムナビ */
    nav {
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      position: sticky;
      bottom: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #888;
      transition: color 0.2s;
      touch-action: manipulation;
    }
    .nav-btn span.icon { font-size: 22px; }
    .nav-btn.active { color: #2d6a4f; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <span>🎒</span>
    <h1>備えログ</h1>
  </header>

  <main>

    <!-- ダッシュボード -->
    <div id="screen-dashboard" class="screen active">
      <div class="section-title">ダッシュボード</div>

      <!-- 充足率ゲージ -->
      <div class="card">
        <h3 id="gauge-title">備蓄充足率（7日分基準）</h3>
        <div class="gauge-label">
          <span>たべ物</span>
          <span style="text-align:right;">
            <span id="food-fraction" style="font-size:12px;color:#888;margin-right:6px;"></span><span id="food-pct">0%</span>
          </span>
        </div>
        <div class="gauge-bar">
          <div class="gauge-fill" id="food-fill" style="width:0%"></div>
        </div>
        <div class="gauge-label" style="margin-top:10px">
          <span>水・のみ物（L換算）</span>
          <span style="text-align:right;">
            <span id="water-fraction" style="font-size:12px;color:#888;margin-right:6px;"></span><span id="water-pct">0%</span>
          </span>
        </div>
        <div class="gauge-bar">
          <div class="gauge-fill" id="water-fill" style="width:0%"></div>
        </div>
        <div class="gauge-label" style="margin-top:10px">
          <span>生活用水（L換算）</span>
          <span style="text-align:right;">
            <span id="utility-fraction" style="font-size:12px;color:#888;margin-right:6px;"></span><span id="utility-pct">0%</span>
          </span>
        </div>
        <div class="gauge-bar">
          <div class="gauge-fill" id="utility-fill" style="width:0%"></div>
        </div>
        <div id="gauge-note" class="gauge-note">設定から家族構成を登録すると自動計算されます</div>
      </div>

      <!-- 期限アラート -->
      <div class="card">
        <h3>⚠️ 期限が近いもの（30日以内）</h3>
        <div id="alert-list">
          <div style="text-align:center;color:#aaa;font-size:14px;padding:12px 0;">
            該当する在庫はありません
          </div>
        </div>
      </div>

      <!-- エクスポート・インポート -->
      <button id="export-btn" onclick="exportJSON()">📤 データをエクスポート（JSON）</button>
      <button id="import-btn" onclick="document.getElementById('import-file').click()">📥 データをインポート（JSON）</button>
      <input id="import-file" type="file" accept=".json" style="display:none" onchange="importJSON(this)">
      <div id="import-msg" style="display:none;text-align:center;font-size:14px;margin-top:4px;"></div>
    </div>

    <!-- 備品追加 -->
    <div id="screen-add" class="screen">
      <div class="section-title">備品追加</div>
      <div class="card">
        <h3>➕ 備品追加</h3>
        <div class="form-group">
          <label>品名</label>
          <input id="item-name" type="text" placeholder="例: 缶詰（さば味噌）">
        </div>

        <!-- 水アイテム用オプション（名前に「水」が含まれると表示） -->
        <div id="water-options" style="display:none;">
          <div class="form-group">
            <label>💧 容量（1本あたり）</label>
            <select id="item-bottle-size" onchange="toggleCustomVolume(this)">
              <option value="0.5">500ml</option>
              <option value="1">1L</option>
              <option value="2" selected>2L</option>
              <option value="custom">その他（直接入力）</option>
            </select>
          </div>
          <div id="custom-volume-group" style="display:none;" class="form-group">
            <label>容量（L）</label>
            <input id="item-custom-volume" type="number" value="1" min="0.1" step="0.1" placeholder="例: 4">
          </div>
        </div>

        <div class="form-group">
          <label>カテゴリ</label>
          <select id="item-category" onchange="updateWaterOptions()">
            <option value="たべ物">たべ物</option>
            <option value="のみ物">のみ物</option>
            <option value="生活用水">生活用水</option>
            <option value="衛生">衛生</option>
            <option value="ペット">ペット</option>
            <option value="道具">道具</option>
          </select>
        </div>
        <div class="form-group">
          <label>保管場所</label>
          <select id="item-location">
            <option value="玄関">🚪 玄関</option>
            <option value="リビング">🛋 リビング</option>
            <option value="キッチン">🍳 キッチン</option>
            <option value="寝室">🛏 寝室</option>
            <option value="押し入れ">📦 押し入れ・クローゼット</option>
            <option value="物置">🏠 物置・ガレージ</option>
            <option value="車">🚗 車</option>
            <option value="勝手口">🚪 勝手口</option>
            <option value="天井裏">🏗 天井裏</option>
            <option value="その他">📍 その他</option>
          </select>
        </div>
        <div class="form-group">
          <label>数量・単位</label>
          <div style="display:flex;gap:8px;">
            <input id="item-qty" type="number" value="1" min="1" style="flex:1;">
            <input id="item-unit" type="text" placeholder="個・kg・袋…" style="flex:1;font-size:16px;padding:12px 14px;border:1px solid #ddd;border-radius:8px;background:white;">
          </div>
        </div>
        <div class="form-group">
          <label>賞味期限（任意）</label>
          <input id="item-expiry" type="date">
        </div>
        <button id="add-btn" onclick="addItem()">追加する</button>
        <button id="cancel-edit-btn" onclick="cancelEdit()" style="display:none;">キャンセル</button>
      </div>
    </div>

    <!-- 在庫一覧 -->
    <div id="screen-inventory" class="screen">
      <div class="section-title">在庫一覧</div>

      <!-- ビュー切り替え -->
      <div class="view-toggle">
        <button class="view-toggle-btn active" onclick="switchView('category', this)">カテゴリ別</button>
        <button class="view-toggle-btn" onclick="switchView('location', this)">場所別</button>
      </div>

      <!-- カテゴリタブ（カテゴリ別ビュー時のみ表示） -->
      <div class="tabs" id="category-tabs">
        <button class="tab active" onclick="switchTab('すべて', this)">すべて</button>
        <button class="tab" onclick="switchTab('たべ物', this)">たべ物</button>
        <button class="tab" onclick="switchTab('のみ物', this)">のみ物</button>
        <button class="tab" onclick="switchTab('生活用水', this)">生活用水</button>
        <button class="tab" onclick="switchTab('衛生', this)">衛生</button>
        <button class="tab" onclick="switchTab('ペット', this)">ペット</button>
        <button class="tab" onclick="switchTab('道具', this)">道具</button>
      </div>

      <!-- 在庫一覧（カテゴリ別） -->
      <div class="card" id="stock-list">
        <div id="empty-msg" style="text-align:center;color:#aaa;font-size:14px;padding:20px 0;">
          在庫がありません。「備品追加」タブから追加してください。
        </div>
      </div>

      <!-- 場所別ビュー -->
      <div id="location-view" style="display:none;"></div>
    </div>

    <!-- 設定 -->
    <div id="screen-settings" class="screen">
      <div class="section-title">設定</div>

      <div class="card">
        <h3>家族構成</h3>
        <div class="form-group">
          <label>大人の人数</label>
          <input id="adults" type="number" value="2" min="1">
        </div>
        <div class="form-group">
          <label>子供の人数</label>
          <input id="children" type="number" value="2" min="0">
        </div>
      </div>

      <div class="card">
        <h3>ペット情報</h3>
        <div class="form-group">
          <label>種類</label>
          <select id="pet-type">
            <option value="なし">なし</option>
            <option value="犬">犬</option>
            <option value="猫">猫</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group" id="pet-weight-group">
          <label>体重（kg）</label>
          <input id="pet-weight" type="number" value="8" min="0" step="0.1">
        </div>
      </div>

      <div class="card">
        <h3>備蓄基準日数</h3>
        <div class="form-group">
          <label>何日分を100%とするか</label>
          <input id="base-days" type="number" value="7" min="1">
        </div>
      </div>

      <div class="card">
        <h3>ℹ️ バージョン情報</h3>
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:14px;">
          <span style="color:#555;">備えログ</span>
          <span id="version-label" style="font-weight:bold;color:#2d6a4f;font-size:16px;"></span>
        </div>
        <div id="version-date" style="font-size:12px;color:#aaa;margin-top:4px;"></div>
      </div>

      <div class="card">
        <h3>🔔 通知設定</h3>
        <p style="font-size:13px;color:#666;margin-bottom:12px;">アプリを開いたとき、期限が7日以内の在庫をお知らせします</p>
        <button id="notif-btn" onclick="requestNotificationPermission()">通知を有効にする</button>
        <div id="notif-status"></div>
      </div>

      <button id="save-btn" onclick="saveSettings()">保存する</button>
      <div id="save-msg" style="display:none;text-align:center;color:#2d6a4f;margin-top:10px;font-size:14px;">✅ 保存しました</div>
    </div>

  </main>

  <!-- ボトムナビ -->
  <nav>
    <button class="nav-btn active" onclick="showScreen('dashboard', this)">
      <span class="icon">🏠</span>
      ホーム
    </button>
    <button class="nav-btn" onclick="showScreen('inventory', this)">
      <span class="icon">📋</span>
      在庫一覧
    </button>
    <button class="nav-btn" onclick="showScreen('add', this)">
      <span class="icon">➕</span>
      備品追加
    </button>
    <button class="nav-btn" onclick="showScreen('settings', this)">
      <span class="icon">⚙️</span>
      設定
    </button>
  </nav>

  <script>
    const VERSION = '2026.06.07-13';

    document.getElementById('version-label').textContent = 'v' + VERSION;
    document.getElementById('version-date').textContent =
      '最終更新: ' + VERSION.split('-')[0].replace(/\./g, '/') +
      '（rev.' + (VERSION.split('-')[1] || '1') + '）';

    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // iOSにデータを自動削除しないよう永続化リクエスト
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist();
    }

    function isiOS() {
      return /iP(hone|ad|od)/.test(navigator.userAgent);
    }
    function isStandalone() {
      return window.navigator.standalone === true ||
             window.matchMedia('(display-mode: standalone)').matches;
    }

    // 通知許可をリクエスト
    async function requestNotificationPermission() {
      const btn = document.getElementById('notif-btn');
      const status = document.getElementById('notif-status');

      if (!('Notification' in window)) {
        if (isiOS()) {
          btn.textContent = '⚠️ 未対応';
          btn.style.background = '#aaa';
          btn.disabled = true;
          status.textContent = 'iOS 16.4以上でホーム画面に追加したアプリのみ通知に対応しています';
        } else {
          btn.textContent = '⚠️ 未対応';
          btn.style.background = '#aaa';
          btn.disabled = true;
          status.textContent = 'このブラウザは通知に対応していません';
        }
        return;
      }

      if (isiOS() && !isStandalone()) {
        btn.textContent = '📱 ホーム画面から起動してください';
        btn.style.background = '#aaa';
        btn.disabled = true;
        status.textContent = 'Safariの「ホーム画面に追加」でインストール後、アプリから設定してください';
        return;
      }

      const permission = await Notification.requestPermission();
      updateNotifStatus(permission);
    }

    function updateNotifStatus(permission) {
      const btn = document.getElementById('notif-btn');
      const status = document.getElementById('notif-status');

      if (!('Notification' in window)) {
        if (isiOS() && !isStandalone()) {
          btn.textContent = '📱 ホーム画面から起動してください';
          btn.style.background = '#aaa';
          btn.disabled = true;
          status.textContent = 'Safariの「ホーム画面に追加」でインストール後、アプリから設定してください';
        } else {
          btn.textContent = '⚠️ 未対応';
          btn.style.background = '#aaa';
          btn.disabled = true;
        }
        return;
      }

      if (isiOS() && !isStandalone()) {
        btn.textContent = '📱 ホーム画面から起動してください';
        btn.style.background = '#aaa';
        btn.disabled = true;
        status.textContent = 'Safariの「ホーム画面に追加」でインストール後、アプリから設定してください';
        return;
      }

      if (permission === 'granted') {
        btn.textContent = '✅ 通知は有効です';
        btn.style.background = '#2d6a4f';
        btn.disabled = true;
        status.textContent = 'アプリを開くたびに期限チェックします';
      } else if (permission === 'denied') {
        btn.textContent = '🚫 通知がブロックされています';
        btn.style.background = '#aaa';
        btn.disabled = true;
        status.textContent = isStandalone()
          ? '設定アプリ → 備えログ → 通知 → オン にしてください'
          : '設定アプリ → Safari → 詳細 → Webサイトの設定 から許可してください';
      }
    }

    // 期限チェックして通知
    function checkExpiryNotifications() {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;

      // 同日に複数回通知しない
      const today = new Date().toDateString();
      if (localStorage.getItem('sonaelog-notified-date') === today) return;

      const items = loadItems();
      const expired   = items.filter(i => i.expiry && daysLeft(i.expiry) < 0);
      const soonItems = items.filter(i => i.expiry && daysLeft(i.expiry) >= 0 && daysLeft(i.expiry) <= 7);

      if (expired.length > 0) {
        new Notification('⚠️ 備えログ：期限切れの在庫があります', {
          body: expired.map(i => i.name).join('、') + ' が期限切れです',
          icon: './icon.svg',
          tag: 'sonaelog'
        });
        localStorage.setItem('sonaelog-notified-date', today);
      } else if (soonItems.length > 0) {
        new Notification('📅 備えログ：期限が近い在庫があります', {
          body: soonItems.map(i => `${i.name}（あと${daysLeft(i.expiry)}日）`).join('、'),
          icon: './icon.svg',
          tag: 'sonaelog'
        });
        localStorage.setItem('sonaelog-notified-date', today);
      }
    }

    function showScreen(name, btn) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('screen-' + name).classList.add('active');
      btn.classList.add('active');
    }

    // ペット種類が「なし」のとき体重欄を非表示
    document.getElementById('pet-type').addEventListener('change', function() {
      document.getElementById('pet-weight-group').style.display =
        this.value === 'なし' ? 'none' : 'block';
    });

    // 設定を保存
    function saveSettings() {
      const settings = {
        adults:    parseInt(document.getElementById('adults').value) || 2,
        children:  parseInt(document.getElementById('children').value) || 0,
        petType:   document.getElementById('pet-type').value,
        petWeight: parseFloat(document.getElementById('pet-weight').value) || 0,
        baseDays:  parseInt(document.getElementById('base-days').value) || 7,
      };
      localStorage.setItem('sonaelog-settings', JSON.stringify(settings));

      const msg = document.getElementById('save-msg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 2000);

      updateDashboard(settings);
    }

    // 設定を読み込んでフォームに反映
    function loadSettings() {
      const raw = localStorage.getItem('sonaelog-settings');
      if (!raw) return;
      const s = JSON.parse(raw);
      document.getElementById('adults').value      = s.adults;
      document.getElementById('children').value    = s.children;
      document.getElementById('pet-type').value    = s.petType;
      document.getElementById('pet-weight').value  = s.petWeight;
      document.getElementById('base-days').value   = s.baseDays;

      if (s.petType === 'なし') {
        document.getElementById('pet-weight-group').style.display = 'none';
      }

      updateDashboard(s);
    }

    function gaugeColor(pct) {
      if (pct <= 30) return 'linear-gradient(90deg, #9b2335, #e53e3e)';
      if (pct <= 60) return 'linear-gradient(90deg, #c05621, #ed8936)';
      return 'linear-gradient(90deg, #2d6a4f, #52b788)';
    }

    // ダッシュボードを実データで更新
    function updateDashboard(s) {
      const days = s.baseDays || 7;
      const adults = s.adults || 2;
      const children = s.children || 0;
      const people = adults + children;

      document.getElementById('gauge-title').textContent = `備蓄充足率（${days}日分基準）`;

      const items = loadItems();

      // たべ物：1人1日3食として必要アイテム数を計算（水を除く）
      const requiredFood = people * days * 3;
      const actualFood = items
        .filter(i => i.category === 'たべ物' && !i.name.includes('水'))
        .reduce((sum, i) => sum + i.qty, 0);
      const foodPct = requiredFood > 0 ? Math.min(100, Math.round(actualFood / requiredFood * 100)) : 0;

      // 水・のみ物：1人1日3L（「のみ物」カテゴリ＋たべ物カテゴリで名前に「水」を含むもの）
      const requiredWater = people * days * 3;
      const actualWater = items
        .filter(i => i.category === 'のみ物' || (i.category === 'たべ物' && i.name.includes('水')))
        .reduce((sum, i) => sum + (i.bottleSize != null ? i.qty * i.bottleSize : i.qty), 0);
      const waterPct = requiredWater > 0 ? Math.min(100, Math.round(actualWater / requiredWater * 100)) : 0;

      document.getElementById('food-fraction').textContent = `${actualFood}食 / ${requiredFood}食`;
      document.getElementById('food-pct').textContent = foodPct + '%';
      document.getElementById('food-fill').style.width = foodPct + '%';
      document.getElementById('food-fill').style.background = gaugeColor(foodPct);

      const actualWaterRounded = Math.round(actualWater * 10) / 10;
      document.getElementById('water-fraction').textContent = `${actualWaterRounded}L / ${requiredWater}L`;
      document.getElementById('water-pct').textContent = waterPct + '%';
      document.getElementById('water-fill').style.width = waterPct + '%';
      document.getElementById('water-fill').style.background = gaugeColor(waterPct);

      // 生活用水：1人1日10L
      const requiredUtility = people * days * 10;
      const actualUtility = items
        .filter(i => i.category === '生活用水')
        .reduce((sum, i) => sum + (i.bottleSize != null ? i.qty * i.bottleSize : i.qty), 0);
      const utilityPct = requiredUtility > 0 ? Math.min(100, Math.round(actualUtility / requiredUtility * 100)) : 0;
      const actualUtilityRounded = Math.round(actualUtility * 10) / 10;
      document.getElementById('utility-fraction').textContent = `${actualUtilityRounded}L / ${requiredUtility}L`;
      document.getElementById('utility-pct').textContent = utilityPct + '%';
      document.getElementById('utility-fill').style.width = utilityPct + '%';
      document.getElementById('utility-fill').style.background = gaugeColor(utilityPct);

      document.getElementById('gauge-note').textContent = `${days}日分の目安（たべ物：1人1日3食 ／ のみ物：3L ／ 生活用水：10L）`;

      // 期限アラート（30日以内）
      const alertList = document.getElementById('alert-list');
      const expiring = items
        .filter(i => i.expiry && daysLeft(i.expiry) !== null && daysLeft(i.expiry) <= 30)
        .sort((a, b) => new Date(a.expiry) - new Date(b.expiry));

      if (expiring.length === 0) {
        alertList.innerHTML = `<div style="text-align:center;color:#aaa;font-size:14px;padding:12px 0;">該当する在庫はありません</div>`;
      } else {
        alertList.innerHTML = expiring.map(item => {
          const days2 = daysLeft(item.expiry);
          return `
            <div class="alert-item">
              <div>
                <div>${item.name}</div>
                <div style="font-size:12px;color:#888;">${item.qty}個 ／ ${item.category}${item.location ? ' ／ ' + locationIcon(item.location) + item.location : ''}</div>
              </div>
              ${badgeHtml(days2)}
            </div>`;
        }).join('');
      }
    }

    function updateWaterOptions() {
      const name = document.getElementById('item-name').value;
      const category = document.getElementById('item-category').value;
      document.getElementById('water-options').style.display =
        (name.includes('水') || category === 'のみ物' || category === '生活用水') ? 'block' : 'none';
    }

    document.getElementById('item-name').addEventListener('input', updateWaterOptions);

    function toggleCustomVolume(sel) {
      document.getElementById('custom-volume-group').style.display =
        sel.value === 'custom' ? 'block' : 'none';
    }

    // ページ読み込み時に設定を復元
    loadSettings();

    // 通知ステータスを反映・期限チェック
    if ('Notification' in window) {
      updateNotifStatus(Notification.permission);
      checkExpiryNotifications();
    }

    // ---- 在庫管理 ----
    let currentTab = 'すべて';
    let currentView = 'category';
    let editingId = null;

    const LOCATION_ICONS = { '玄関': '🚪', 'リビング': '🛋', 'キッチン': '🍳', '寝室': '🛏', '押し入れ': '📦', '物置': '🏠', '車': '🚗', '勝手口': '🚪', '天井裏': '🏗', 'その他': '📍' };
    const LOCATION_ORDER = ['玄関', '勝手口', 'リビング', 'キッチン', '寝室', '押し入れ', '物置', '天井裏', '車', 'その他'];
    function locationIcon(loc) { return LOCATION_ICONS[loc] || '📍'; }

    function loadItems() {
      return JSON.parse(localStorage.getItem('sonaelog-items') || '[]');
    }

    function saveItems(items) {
      localStorage.setItem('sonaelog-items', JSON.stringify(items));
    }

    function daysLeft(expiryStr) {
      if (!expiryStr) return null;
      const diff = new Date(expiryStr) - new Date();
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function qtyLabel(item) {
      if (item.bottleSize != null) {
        const totalL = Math.round(item.qty * item.bottleSize * 10) / 10;
        const sizeLabel = item.bottleSize < 1 ? `${item.bottleSize * 1000}ml` : `${item.bottleSize}L`;
        return `${item.qty}本（${sizeLabel}）計${totalL}L`;
      }
      const unit = item.unit || '個';
      return `${item.qty}${unit}`;
    }

    function badgeHtml(days) {
      if (days === null) return '';
      if (days < 0)  return `<span class="badge danger">期限切れ</span>`;
      if (days <= 7) return `<span class="badge danger">あと${days}日</span>`;
      if (days <= 30) return `<span class="badge warning">あと${days}日</span>`;
      return `<span class="badge" style="background:#e8f5e9;color:#2d6a4f;">あと${days}日・余裕あり</span>`;
    }

    function renderItems() {
      const items = loadItems()
        .filter(i => currentTab === 'すべて' || i.category === currentTab)
        .sort((a, b) => {
          if (!a.expiry) return 1;
          if (!b.expiry) return -1;
          return new Date(a.expiry) - new Date(b.expiry);
        });

      const list = document.getElementById('stock-list');
      const empty = document.getElementById('empty-msg');

      const existing = list.querySelectorAll('.stock-item');
      existing.forEach(e => e.remove());

      if (items.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      items.forEach(item => {
        const days = daysLeft(item.expiry);
        const div = document.createElement('div');
        div.className = 'stock-item';
        div.innerHTML = `
          <div style="flex:1">
            <div class="stock-name">${item.name}</div>
            <div class="stock-meta">
              ${item.category} ／ ${qtyLabel(item)}
              ${item.location ? ' ／ ' + locationIcon(item.location) + item.location : ''}
              ${item.expiry ? '／ 期限: ' + item.expiry : ''}
            </div>
          </div>
          ${badgeHtml(days)}
          <button class="edit-btn" onclick="editItem('${item.id}')">✏️</button>
          <button class="delete-btn" onclick="deleteItem('${item.id}')">🗑</button>
        `;
        list.appendChild(div);
      });
    }

    function addItem() {
      const name = document.getElementById('item-name').value.trim();
      if (!name) { alert('品名を入力してください'); return; }

      const isWater = name.includes('水') || ['のみ物', '生活用水'].includes(document.getElementById('item-category').value);
      let bottleSize = null;
      if (isWater) {
        const sizeVal = document.getElementById('item-bottle-size').value;
        bottleSize = sizeVal === 'custom'
          ? parseFloat(document.getElementById('item-custom-volume').value) || 1
          : parseFloat(sizeVal);
      }

      const newData = {
        name,
        category:   document.getElementById('item-category').value,
        location:   document.getElementById('item-location').value,
        qty:        parseInt(document.getElementById('item-qty').value) || 1,
        unit:       document.getElementById('item-unit').value.trim(),
        bottleSize,
        expiry:     document.getElementById('item-expiry').value,
      };

      const items = loadItems();
      if (editingId) {
        const idx = items.findIndex(i => i.id === editingId);
        if (idx !== -1) items[idx] = { ...items[idx], ...newData };
      } else {
        items.push({ id: Date.now().toString(), ...newData });
      }
      saveItems(items);
      resetForm();

      if (currentView === 'location') renderByLocation(); else renderItems();
    }

    function editItem(id) {
      const item = loadItems().find(i => i.id === id);
      if (!item) return;

      editingId = id;
      document.getElementById('item-name').value = item.name;
      document.getElementById('item-category').value = item.category;
      document.getElementById('item-location').value = item.location || '玄関';
      document.getElementById('item-qty').value = item.qty;
      document.getElementById('item-unit').value = item.unit || '';
      document.getElementById('item-expiry').value = item.expiry || defaultExpiryDate();

      updateWaterOptions();
      if (item.bottleSize != null) {
        const standardSizes = ['0.5', '1', '2'];
        const sizeStr = String(item.bottleSize);
        if (standardSizes.includes(sizeStr)) {
          document.getElementById('item-bottle-size').value = sizeStr;
          document.getElementById('custom-volume-group').style.display = 'none';
        } else {
          document.getElementById('item-bottle-size').value = 'custom';
          document.getElementById('item-custom-volume').value = item.bottleSize;
          document.getElementById('custom-volume-group').style.display = 'block';
        }
      }

      const formCard = document.querySelector('#screen-inventory .card');
      formCard.classList.add('editing');
      formCard.querySelector('h3').textContent = '✏️ 在庫を編集';
      document.getElementById('add-btn').textContent = '更新する';
      document.getElementById('cancel-edit-btn').style.display = 'block';

      const addNavBtn = document.querySelector('.nav-btn[onclick*="\'add\'"]');
      showScreen('add', addNavBtn);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
      resetForm();
    }

    function resetForm() {
      editingId = null;
      document.getElementById('item-name').value = '';
      document.getElementById('item-expiry').value = '';
      document.getElementById('item-qty').value = '1';
      document.getElementById('item-unit').value = '';
      document.getElementById('item-category').value = 'たべ物';
      document.getElementById('water-options').style.display = 'none';
      document.getElementById('item-bottle-size').value = '2';
      document.getElementById('custom-volume-group').style.display = 'none';

      const formCard = document.querySelector('#screen-inventory .card');
      formCard.classList.remove('editing');
      formCard.querySelector('h3').textContent = '➕ 備品追加';
      document.getElementById('add-btn').textContent = '追加する';
      document.getElementById('cancel-edit-btn').style.display = 'none';

      const invNavBtn = document.querySelector('.nav-btn[onclick*="\'inventory\'"]');
      showScreen('inventory', invNavBtn);
    }

    function deleteItem(id) {
      const item = loadItems().find(i => i.id === id);
      if (!item) return;
      if (!confirm(`「${item.name}」を削除しますか？`)) return;
      const items = loadItems().filter(i => i.id !== id);
      saveItems(items);
      if (currentView === 'location') renderByLocation(); else renderItems();
    }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderItems();
    }

    function switchView(view, btn) {
      currentView = view;
      document.querySelectorAll('#screen-inventory .view-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const tabs = document.getElementById('category-tabs');
      const stockList = document.getElementById('stock-list');
      const locationView = document.getElementById('location-view');

      if (view === 'category') {
        tabs.style.display = 'flex';
        stockList.style.display = 'block';
        locationView.style.display = 'none';
        renderItems();
      } else {
        tabs.style.display = 'none';
        stockList.style.display = 'none';
        locationView.style.display = 'block';
        renderByLocation();
      }
    }

    function renderByLocation() {
      const allItems = loadItems();
      const container = document.getElementById('location-view');

      if (allItems.length === 0) {
        container.innerHTML = `<div class="card" style="text-align:center;color:#aaa;font-size:14px;padding:20px 0;">在庫がありません。上のフォームから追加してください。</div>`;
        return;
      }

      const grouped = {};
      allItems.forEach(item => {
        const loc = item.location || 'その他';
        if (!grouped[loc]) grouped[loc] = [];
        grouped[loc].push(item);
      });

      const sortedLocs = Object.keys(grouped).sort((a, b) => {
        const ai = LOCATION_ORDER.indexOf(a);
        const bi = LOCATION_ORDER.indexOf(b);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      });

      container.innerHTML = sortedLocs.map(loc => {
        const items = grouped[loc].sort((a, b) => {
          if (!a.expiry) return 1;
          if (!b.expiry) return -1;
          return new Date(a.expiry) - new Date(b.expiry);
        });
        const totalQty = items.reduce((s, i) => s + i.qty, 0);

        return `
          <div class="location-group">
            <div class="location-group-header">
              <span>${locationIcon(loc)} ${loc}</span>
              <span class="location-count">${items.length}種 ／ 計${totalQty}個</span>
            </div>
            ${items.map(item => {
              const days = daysLeft(item.expiry);
              return `
                <div class="stock-item">
                  <div style="flex:1">
                    <div class="stock-name">${item.name}</div>
                    <div class="stock-meta">${item.category} ／ ${qtyLabel(item)}${item.expiry ? ' ／ 期限: ' + item.expiry : ''}</div>
                  </div>
                  ${badgeHtml(days)}
                  <button class="edit-btn" onclick="editItem('${item.id}')">✏️</button>
                  <button class="delete-btn" onclick="deleteItem('${item.id}')">🗑</button>
                </div>`;
            }).join('')}
          </div>`;
      }).join('');
    }

    function defaultExpiryDate() {
      const d = new Date();
      d.setFullYear(d.getFullYear() + 1);
      return d.toISOString().slice(0, 10);
    }

    document.getElementById('item-expiry').addEventListener('focus', function() {
      if (!this.value) this.value = defaultExpiryDate();
    });

    renderItems();

    // 在庫変更時にダッシュボードも再描画
    const _origSaveItems = saveItems;
    saveItems = function(items) {
      _origSaveItems(items);
      const raw = localStorage.getItem('sonaelog-settings');
      if (raw) updateDashboard(JSON.parse(raw));
    };

    // JSONエクスポート
    function exportJSON() {
      const data = {
        settings:   JSON.parse(localStorage.getItem('sonaelog-settings') || '{}'),
        items:      loadItems(),
        exportedAt: new Date().toLocaleString('ja-JP'),
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `備えログ_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    // JSONインポート
    function importJSON(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.items || !Array.isArray(data.items)) throw new Error('形式が正しくありません');

          if (!confirm(`在庫${data.items.length}件をインポートします。現在のデータは上書きされます。よろしいですか？`)) {
            input.value = '';
            return;
          }

          localStorage.setItem('sonaelog-items', JSON.stringify(data.items));
          if (data.settings && Object.keys(data.settings).length > 0) {
            localStorage.setItem('sonaelog-settings', JSON.stringify(data.settings));
            loadSettings();
          }

          const msg = document.getElementById('import-msg');
          msg.textContent = `✅ ${data.items.length}件をインポートしました`;
          msg.style.color = '#2d6a4f';
          msg.style.display = 'block';
          setTimeout(() => msg.style.display = 'none', 3000);

          if (currentView === 'location') renderByLocation(); else renderItems();
        } catch (err) {
          const msg = document.getElementById('import-msg');
          msg.textContent = '❌ 読み込みに失敗しました（ファイルを確認してください）';
          msg.style.color = '#e53e3e';
          msg.style.display = 'block';
          setTimeout(() => msg.style.display = 'none', 4000);
        }
        input.value = '';
      };
      reader.readAsText(file);
    }
  </script>

</body>
